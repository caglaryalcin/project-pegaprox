name: Build and Push Docker Image

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  UPSTREAM_REPO: PegaProx/project-pegaprox
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/pegaprox
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Get latest upstream release
        id: upstream
        run: |
          LATEST=$(curl -s https://api.github.com/repos/${{ env.UPSTREAM_REPO }}/releases/latest | jq -r '.tag_name')
          echo "version=$LATEST" >> $GITHUB_OUTPUT

      - name: Get last built version
        id: last_built
        run: |
          LAST=$(curl -s https://api.github.com/repos/${{ github.repository }}/releases/latest \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" | jq -r '.tag_name // "none"')
          echo "version=$LAST" >> $GITHUB_OUTPUT

      - name: Check if build needed
        id: check
        run: |
          if [ "${{ steps.upstream.outputs.version }}" != "${{ steps.last_built.outputs.version }}" ]; then
            echo "needed=true" >> $GITHUB_OUTPUT
          else
            echo "needed=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout upstream
        if: steps.check.outputs.needed == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ env.UPSTREAM_REPO }}
          ref: ${{ steps.upstream.outputs.version }}

      - name: Log in to GHCR
        if: steps.check.outputs.needed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: steps.check.outputs.needed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.upstream.outputs.version }}

      - name: Create release to track built version
        if: steps.check.outputs.needed == 'true'
        run: |
          curl -s -X POST https://api.github.com/repos/${{ github.repository }}/releases \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "tag_name": "${{ steps.upstream.outputs.version }}",
              "name": "${{ steps.upstream.outputs.version }}",
              "body": "Auto-built from upstream ${{ steps.upstream.outputs.version }}"
            }'
